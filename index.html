<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOT">
  <meta name="theme-color" content="#060c10">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>MOT · Load Model</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      margin: 0; padding: 0;
      background: #060c10;
      /* Use dvh (dynamic viewport height) which accounts for Safari address bar.
         Fall back to -webkit-fill-available for older iOS. */
      height: 100dvh;
      height: -webkit-fill-available;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      position: fixed;
      width: 100%;
      /* Safe area insets for notch / home indicator */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    input[type=number] { -webkit-appearance: none; appearance: none; }
    input:focus { outline: none; }
    button { -webkit-appearance: none; touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="recordings.js"></script>
  <script src="app.js"></script>
</body>
</html>
